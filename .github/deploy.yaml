name: Salesforce CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Install Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # 4. Create JWT key file
      - name: Create JWT Key
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      # 5. Authenticate (SINGLE LINE FIX)
      - name: Authenticate Org
        run: |
          sf org login jwt --client-id ${{ secrets.SF_CLIENT_ID }} --jwt-key-file server.key --username ${{ secrets.SF_USERNAME }} --instance-url ${{ vars.SF_INSTANCE_URL }}

      # 6. Verify Login (DEBUG STEP)
      - name: Verify Org
        run: sf org list

      # 7. Validate Deployment
      - name: Validate Deployment
        run: |
          sf project deploy start --source-dir force-app --target-org ${{ secrets.SF_USERNAME }} --check-only --test-level RunLocalTests --wait 20

      # 8. Deploy
      - name: Deploy to Salesforce
        run: |
          sf project deploy start --source-dir force-app --target-org ${{ secrets.SF_USERNAME }} --wait 20